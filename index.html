<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player PRO Custom</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
<style>
html, body { 
    margin: 0; 
    padding: 0; 
    background: black; 
    height: 100%; 
    overflow: hidden; 
    font-family: sans-serif; 
}
#player { 
    position: relative; 
    width: 100%; 
    height: 100vh; 
    background: black; 
}
.video-wrapper { 
    position: absolute; 
    top: 0; left: 0; 
    width: 100%; 
    height: 100%; 
    display: none; 
}
video, iframe { 
    width: 100%; 
    height: 100%; 
    object-fit: contain; 
    background: black; 
    border: none; 
    position: absolute; 
    top: 0; 
    left: 0; 
}
#bloqueo-flecha { 
    position: absolute; 
    top: 0; 
    right: 0; 
    width: 180px; 
    height: 60px; 
    background: rgba(0,0,0,0); 
    z-index: 1000; 
    display: none; 
}
.controls { 
    position: absolute; 
    bottom: 0; 
    width: 100%; 
    padding: 15px; 
    box-sizing: border-box; 
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); 
    opacity: 0; 
    pointer-events: none;
    transition: opacity 0.3s; 
    z-index: 10; 
}
.controls.show { 
    opacity: 1; 
    pointer-events: auto;
}
.btn { 
    color: white !important; 
    font-size: 15px; 
    cursor: pointer; 
    margin-right: 15px; 
    text-shadow: 0 0 5px rgba(142, 68, 173, 0.8); 
    outline: none; 
    -webkit-tap-highlight-color: transparent; 
    display: inline-block; 
    user-select: none; 
    transition: color 0.1s ease;
    -webkit-tap-highlight-color: transparent !important; 
    tap-highlight-color: transparent !important; 
}
.btn:hover, .btn:focus, .btn:active { 
    color: #bc13fe !important; 
    text-shadow: 0 0 10px #bc13fe; 
}
.btn.paused-frame {
    border: 1px solid rgba(188, 19, 254, 0.7);
    box-shadow: 0 0 10px rgba(188, 19, 254, 0.6);
}
</style>
</head>

<body>
<div id="player">

<div class="video-wrapper" id="videoWrapper">
<video id="video" playsinline></video>
</div>

<div id="bloqueo-flecha"></div>

<div class="controls" id="controls">
<span class="btn" id="playPause">▶️</span>
<span class="btn" id="rewind">⏪</span>
<span class="btn" id="forward">⏩</span>
<span class="btn" id="mute">🔊</span>
<span class="btn" id="subtitles">CC</span>
<span class="btn" id="fullscreen">⛶</span>
</div>

</div>

<script>
const video = document.getElementById("video");
const wrapper = document.getElementById("videoWrapper");

const controls = document.getElementById("controls");
const playPause = document.getElementById("playPause");
const rewind = document.getElementById("rewind");
const forward = document.getElementById("forward");
const mute = document.getElementById("mute");
const subtitles = document.getElementById("subtitles");
const fullscreen = document.getElementById("fullscreen");

let controlsTimeout;

// Mostrar controles
function showControls() {
    controls.classList.add("show");
    clearTimeout(controlsTimeout);
    controlsTimeout = setTimeout(() => {
        controls.classList.remove("show");
    }, 3000);
}

// Eventos de interacción
document.addEventListener("mousemove", showControls);
document.addEventListener("touchstart", showControls);

// Play / Pause
playPause.addEventListener("click", () => {
    if (video.paused) {
        video.play();
        playPause.textContent = "⏸";
    } else {
        video.pause();
        playPause.textContent = "▶️";
    }
});

// Adelantar / Retroceder
rewind.addEventListener("click", () => video.currentTime -= 10);
forward.addEventListener("click", () => video.currentTime += 10);

// Mute
mute.addEventListener("click", () => {
    video.muted = !video.muted;
    mute.textContent = video.muted ? "🔇" : "🔊";
});

// Fullscreen
fullscreen.addEventListener("click", () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
});

// Subtítulos (placeholder)
subtitles.addEventListener("click", () => {
    alert("Subtítulos no configurados aún");
});

// Cargar ejemplo HLS
const url = "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";

if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play();
        wrapper.style.display = "block";
    });
} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.addEventListener('loadedmetadata', () => {
        video.play();
        wrapper.style.display = "block";
    });
}

</script>
</body>
</html>
